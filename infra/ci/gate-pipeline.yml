# CI 게이트 파이프라인 설계
# 실제 GitHub Actions / CI 도구에 맞게 변환하여 사용한다

name: OMS Gate Pipeline

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

env:
  DATABASE_URL: ${{ secrets.DATABASE_URL }}
  DATABASE_USERNAME: ${{ secrets.DATABASE_USERNAME }}
  DATABASE_PASSWORD: ${{ secrets.DATABASE_PASSWORD }}

jobs:
  gate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # L1: 컴파일 게이트
      - name: "[L1] Compile"
        run: ./gradlew compileJava

      # L2: 단위 테스트 + ArchUnit 게이트
      - name: "[L2] Test (Unit + Architecture)"
        run: ./gradlew test

      # L3: 전체 빌드 게이트
      - name: "[L3] Build"
        run: ./gradlew build

      - name: Upload test report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-report
          path: build/reports/tests/